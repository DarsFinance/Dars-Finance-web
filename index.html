<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DARS Finance | Bitcoin Sovereignty</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;700&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange-accent: #f97316;
      --blue-accent: #f97316; /* Ajustado al acento naranja */
      --bg-deep: #020617;
      --bg-mid: #0f172a;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Syne', sans-serif;
      background-color: var(--bg-deep);
      color: #e2e8f0;
    }

    .mono { font-family: 'IBM Plex Mono', monospace; }

    /* Glass */
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Animated gradient blob */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      animation: drift 12s ease-in-out infinite alternate;
    }
    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -40px) scale(1.1); }
    }

    /* Nav */
    nav {
      position: fixed;
      width: 100%;
      z-index: 50;
      top: 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    /* Mobile menu */
    #mobile-menu {
      display: none;
    }
    #mobile-menu.open {
      display: flex;
    }

    /* Hamburger */
    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: #e2e8f0;
      transition: all 0.3s;
      transform-origin: center;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* Section divider */
    .section-divider {
      width: 40px;
      height: 1px;
      background: var(--blue-accent);
      margin-bottom: 2rem;
    }

    /* Stat card */
    .stat-card {
      border: 1px solid rgba(255,255,255,0.08);
      transition: border-color 0.3s, transform 0.3s;
    }
    .stat-card:hover {
      border-color: rgba(249, 115, 22, 0.4);
      transform: translateY(-4px);
    }

    /* Feature grid item */
    .feature-item {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 2rem 0;
      transition: background 0.3s;
    }
    .feature-item:hover .feature-num {
      color: var(--blue-accent);
    }

    /* Input focus */
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--blue-accent);
    }

    /* Fade-in animation */
    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.8s ease forwards;
    }
    .fade-in-delay-1 { animation-delay: 0.15s; }
    .fade-in-delay-2 { animation-delay: 0.3s; }
    .fade-in-delay-3 { animation-delay: 0.45s; }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Success message */
    #form-success {
      display: none;
    }

    /* Footer line */
    footer a:hover { color: white; }

    /* Scroll indicator */
    .scroll-line {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
      margin: 0 auto;
      animation: pulse-line 2s ease-in-out infinite;
    }
    @keyframes pulse-line {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
