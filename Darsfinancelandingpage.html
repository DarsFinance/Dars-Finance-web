<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARS Finance | Bitcoin Sovereignty</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.hero-gradient { background: linear-gradient(180deg, #0f172a 0%, #020617
100%); }
.glass { background: rgba(255, 255, 255, 0.03); backdrop-filter:
blur(10px); }
</style>
</head>
<body class="bg-[#020617] text-gray-200 font-sans">
<!-- Navbar -->
<nav class="fixed w-full z-50 glass border-b border-white/10">
<div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
<div class="text-2xl font-bold tracking-tighter text-white">DARS</div>
<div class="hidden md:flex space-x-8 text-sm uppercase tracking-widest
text-gray-400">
<a href="#seguridad" class="hover:text-white transition">Seguridad</
a>
<a href="#riesgo" class="hover:text-white transition">Riesgo</a>
<a href="#legal" class="hover:text-white transition">Legal</a>
</div>
<button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2
rounded-sm text-sm font-semibold transition">
Acceso Beta
</button>
</div>
</nav><!-- Hero Section -->
<section class="relative min-h-screen flex items-center pt-20 overflow-hidden">
<div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
<div>
<h1 class="text-6xl md:text-8xl font-light text-white leading-tight
mb-6">
Liquidez sin vender tus <span class="text-blue-500 font-
normal">Bitcoin</span>
</h1>
<p class="text-xl text-gray-400 mb-10 max-w-lg">
Obtén crédito inmediato manteniendo tus llaves privadas. Sin
custodia centralizada, con transparencia total bajo el protocolo Multisig 2/3.
</p>
<form name="waitlist" method="POST" data-netlify="true" class="flex
flex-col sm:flex-row gap-4">
<input type="email" name="email" placeholder="Tu correo
electrónico" required
class="bg-white/5 border border-white/10 px-6 py-4
rounded-sm flex-grow focus:outline-none focus:border-blue-500 transition">
<button type="submit" class="bg-white text-black font-bold px-8
py-4 rounded-sm hover:bg-gray-200 transition">
Unirse a la lista
</button>
</form>
</div>
<div class="hidden md:block relative h-[600px] border-l border-white/5
pl-12">
<div class="absolute inset-0 bg-gradient-to-b from-blue-500/10 to-
transparent rounded-full blur-3xl"></div>
<div class="relative z-10 space-y-8">
<div class="glass p-8 border border-white/10 rounded-lg">
<p class="text-xs text-blue-400 uppercase tracking-widest
mb-2">Protocolo Activo</p>
<p class="text-2xl font-light">Custodia Multisig 2-de-3</p>
</div>
<div class="glass p-8 border border-white/10 rounded-lg
opacity-50">
<p class="text-xs text-gray-400 uppercase tracking-widest
mb-2">LTV Dinámico</p>
<p class="text-2xl font-light">Hasta 2.5x Colateral</p>
</div>
</div>
</div>
</div>
</section>
</body>
</html>
